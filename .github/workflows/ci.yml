name: CI

on:
  push:
    branches-ignore:
      - main
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Lint, format, and type checks
    runs-on: ubuntu-slim

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip

      - name: Bootstrap CI environment
        run: python -m tools.devtools bootstrap ci

      - name: Run pre-commit hooks
        run: python -m tools.devtools run pre-commit

  tests:
    name: Tests
    runs-on: ubuntu-latest
    needs: quality
    env:
      QT_QPA_PLATFORM: offscreen

    steps:
      - name: Install OS dependencies
        run: |
          sudo apt-get update
          sudo apt-get install --yes libegl1

      - name: Check out repository
        uses: actions/checkout@v5
        with:
          lfs: true

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip

      - name: Bootstrap CI environment
        run: python -m tools.devtools bootstrap ci

      - name: Run test suite
        run: python -m tools.devtools test all

  build:
    name: Build distribution
    runs-on: ubuntu-slim
    needs:
      - tests

    steps:
      - name: Check out repository
        uses: actions/checkout@v5
        with:
          lfs: true

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip

      - name: Bootstrap CI environment
        run: python -m tools.devtools bootstrap ci

      - name: Build package
        run: python -m tools.devtools build

      - name: Validate built package
        run: python -m tools.devtools validate build "$(find dist -name '*.whl' -type f | head -n 1)"
