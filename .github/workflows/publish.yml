name: Publish

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Git tag to publish (e.g. v0.1.0)"
        required: true

concurrency:
  group: publish-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    name: Build and publish pychessview to PyPI
    runs-on: ubuntu-latest
    env:
      QT_QPA_PLATFORM: offscreen
    environment:
      name: pypi
    permissions:
      contents: write
      id-token: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v5
        with:
          ref: ${{ inputs.tag }}
          fetch-depth: 0
          lfs: true

      - name: Validate tag is on main
        run: git merge-base --is-ancestor "$GITHUB_SHA" origin/main

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip

      - name: Bootstrap CI environment
        run: python -m tools.devtools bootstrap ci

      - name: Validate publish readiness
        run: python -m tools.devtools validate readiness

      - name: Build pychessview package
        run: python -m tools.devtools build

      - name: Validate built package
        run: python -m tools.devtools validate build "$(find dist -name '*.whl' -type f | head -n 1)"

      - name: Publish pychessview to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag }}
          files: dist/*
